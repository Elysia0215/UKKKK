<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UKKKK — 서울시 출산·양육 정책 수요 분석 대시보드 발표덱</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root{
    --teal:#147d72; --teal2:#0f6a60;
    --cream:#FCFBE6; --ink:#111;
    --navy:#151D3E; --navy2:#1C2650; --navy3:#0F1530;
    --line:#2A3565;
    --text:#F2F5FF; --muted:#97A0C6; --dim:#5A628C;
    --gold:#FBC44D; --purple:#A78BFA; --blue:#5B8CFF; --green:#4ADE80; --coral:#FB7185;
    --sans:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;
    --num:'Calibri','Segoe UI',var(--sans);
  }
  html,body{ height:100%; background:#0b0b0b; font-family:var(--sans); }
  #app{ width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .stage{
    width:1280px; height:720px; flex:0 0 auto;
    transform-origin:center center;
    background:
      radial-gradient(circle at 20% 15%, rgba(255,255,255,0.05), transparent 40%),
      var(--teal);
    position:relative; display:flex; align-items:center; justify-content:center;
  }
  /* subtle desktop dotted texture */
  .stage::before{
    content:""; position:absolute; inset:0;
    background-image:radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size:22px 22px; pointer-events:none;
  }
  /* desktop taskbar-ish footer */
  .taskbar{
    position:absolute; left:0; right:0; bottom:0; height:34px;
    background:#C6C6BE; border-top:2px solid #EFEFEA;
    display:flex; align-items:center; padding:0 8px; gap:8px; z-index:5;
    font-family:var(--sans);
  }
  .start{ display:flex; align-items:center; gap:6px; font-weight:700; font-size:13px; color:#111;
    background:#C6C6BE; border-top:1px solid #EFEFEA; border-left:1px solid #EFEFEA;
    border-right:1px solid #6b6b66; border-bottom:1px solid #6b6b66; padding:3px 12px 3px 8px; }
  .start .sprout{ font-size:14px; }
  .clock{ margin-left:auto; font-size:12px; color:#111; border:1px solid #6b6b66; padding:3px 8px; background:#d6d6ce; }
  .pageno{ font-size:12px; color:#111; padding:3px 8px; }

  /* window */
  .win{
    position:absolute; top:26px; left:34px; right:34px; bottom:52px;
    background:var(--cream); border:2.5px solid var(--ink); border-radius:12px;
    box-shadow:6px 8px 0 rgba(0,0,0,0.30);
    display:flex; flex-direction:column; overflow:hidden; z-index:3;
  }
  .titlebar{
    height:38px; flex:0 0 auto;
    background:linear-gradient(90deg,#1c3f8f,#3f7fd4);
    color:#fff; display:flex; align-items:center; justify-content:space-between;
    padding:0 8px 0 12px;
  }
  .titlebar .t{ display:flex; align-items:center; gap:8px; font-size:15px; font-weight:700; letter-spacing:0.2px; }
  .titlebar .t .sprout{ font-size:15px; }
  .winbtns{ display:flex; gap:4px; }
  .winbtns span{ width:22px; height:19px; background:#C0C0C0; border-top:1.5px solid #fff; border-left:1.5px solid #fff;
    border-right:1.5px solid #555; border-bottom:1.5px solid #555; color:#000; font-size:11px; font-weight:700;
    display:flex; align-items:center; justify-content:center; }
  .content{
    flex:1 1 auto; margin:10px; border-radius:8px; background:var(--navy);
    position:relative; overflow:hidden; padding:34px 40px;
    display:flex; flex-direction:column;
  }
  /* eyebrow */
  .eyebrow{ display:flex; align-items:center; gap:9px; font-size:14px; font-weight:700; color:var(--muted); letter-spacing:0.3px; }
  .eyebrow .bar{ width:22px; height:3px; border-radius:2px; background:var(--purple); }
  .headline{ font-size:31px; font-weight:700; color:var(--text); margin-top:12px; line-height:1.25; }
  .sub{ font-size:15px; color:var(--muted); margin-top:8px; line-height:1.5; }

  .spacer{ flex:1 1 auto; }

  /* big number */
  .bigrow{ display:flex; align-items:baseline; gap:16px; }
  .bignum{ font-family:var(--num); font-size:110px; font-weight:700; color:var(--gold); line-height:0.9; letter-spacing:-1px; }
  .bigunit{ font-size:16px; color:var(--muted); line-height:1.5; }
  .source{ font-size:13px; color:var(--dim); margin-top:14px; }

  /* tags */
  .tags{ display:flex; flex-wrap:wrap; gap:9px; margin-top:16px; }
  .tag{ font-size:14px; padding:7px 14px; border-radius:16px; border:1px solid; font-weight:500; }
  .tag.g{ color:var(--green); background:rgba(74,222,128,.13); border-color:rgba(74,222,128,.4); }
  .tag.b{ color:var(--blue); background:rgba(91,140,255,.13); border-color:rgba(91,140,255,.4); }
  .tag.p{ color:var(--purple); background:rgba(167,139,250,.13); border-color:rgba(167,139,250,.4); }
  .tag.gold{ color:var(--gold); background:rgba(251,196,77,.13); border-color:rgba(251,196,77,.4); }

  /* cards */
  .cards{ display:grid; gap:14px; margin-top:auto; }
  .cards.c2{ grid-template-columns:1fr 1fr; }
  .cards.c4{ grid-template-columns:1fr 1fr; }
  .card{ background:var(--navy2); border:1px solid var(--line); border-radius:10px; padding:16px 18px; }
  .card h4{ font-size:16px; color:var(--text); font-weight:700; display:flex; align-items:center; gap:8px; }
  .card p{ font-size:13.5px; color:var(--muted); margin-top:7px; line-height:1.55; }
  .card .num{ font-family:var(--num); font-size:15px; color:var(--gold); font-weight:700; }

  /* two column as-is/to-be */
  .cols{ display:grid; grid-template-columns:1fr auto 1fr; gap:20px; align-items:stretch; margin-top:auto; }
  .col{ background:var(--navy2); border:1px solid var(--line); border-radius:10px; padding:18px 20px; }
  .col.asis{ opacity:0.9; }
  .col.tobe{ border-color:rgba(74,222,128,.45); background:rgba(74,222,128,.06); }
  .col .lbl{ font-size:12px; font-weight:700; letter-spacing:1px; color:var(--muted); }
  .col.tobe .lbl{ color:var(--green); }
  .col ul{ margin-top:10px; list-style:none; display:flex; flex-direction:column; gap:8px; }
  .col li{ font-size:14px; color:var(--text); line-height:1.45; padding-left:16px; position:relative; }
  .col li::before{ content:"—"; position:absolute; left:0; color:var(--dim); }
  .arrow{ display:flex; align-items:center; font-size:34px; color:var(--gold); }

  /* pipeline funnel */
  .pipe{ display:flex; align-items:center; gap:14px; margin-top:auto; }
  .nodes{ display:flex; flex-direction:column; gap:9px; flex:0 0 auto; }
  .node{ background:var(--navy2); border:1px solid var(--line); border-radius:8px; padding:9px 14px; font-size:14px; color:var(--text);
    display:flex; align-items:center; justify-content:space-between; gap:16px; min-width:300px; }
  .node .n{ font-family:var(--num); font-weight:700; color:var(--gold); font-size:15px; }
  .funnel{ font-size:30px; color:var(--muted); }
  .hub{ background:linear-gradient(135deg,var(--purple),var(--blue)); color:#fff; border-radius:12px; padding:20px 22px;
    font-weight:700; font-size:17px; text-align:center; line-height:1.4; box-shadow:0 6px 20px rgba(91,140,255,.3); }

  /* formula */
  .formula{ background:var(--navy2); border:1px solid var(--line); border-radius:12px; padding:26px 24px; margin-top:auto;
    text-align:center; font-family:var(--num); font-size:23px; color:var(--text); line-height:1.6; }
  .formula .k{ color:var(--blue); font-weight:700; }
  .formula .w{ color:var(--gold); font-weight:700; }
  .chips{ display:flex; gap:12px; margin-top:14px; }
  .chip{ flex:1; background:var(--navy2); border:1px solid var(--line); border-radius:10px; padding:12px 14px; font-size:13.5px; color:var(--muted); }
  .chip b{ color:var(--gold); font-family:var(--num); }

  /* screenshot polaroid */
  .shotwrap{ flex:1 1 auto; display:flex; align-items:center; justify-content:center; margin-top:10px; min-height:0; }
  .polaroid{ background:#fff; padding:12px 12px 40px; border-radius:4px; box-shadow:0 14px 34px rgba(0,0,0,.5);
    transform:rotate(-1.4deg); max-height:100%; position:relative; }
  .polaroid img{ display:block; max-height:330px; max-width:640px; width:auto; border-radius:2px; border:1px solid #ddd; }
  .polaroid .cap{ position:absolute; bottom:10px; left:0; right:0; text-align:center; font-size:13px; color:#555; font-family:var(--sans); }

  /* task flow tree */
  .tree{ display:grid; grid-template-columns:1fr 1fr; gap:9px 18px; margin-top:auto; }
  .leaf{ background:var(--navy2); border:1px solid var(--line); border-left:3px solid var(--purple); border-radius:6px;
    padding:9px 13px; font-size:13.5px; color:var(--text); display:flex; align-items:center; gap:9px; }
  .leaf .idx{ font-family:var(--num); font-weight:700; color:var(--purple); font-size:14px; }

  /* effectiveness bars */
  .bars{ display:flex; gap:34px; align-items:flex-end; margin-top:auto; height:280px; padding:0 20px; }
  .barcol{ display:flex; flex-direction:column; align-items:center; justify-content:flex-end; flex:1; height:100%; }
  .barcol .bar{ width:120px; border-radius:8px 8px 0 0; display:flex; align-items:flex-start; justify-content:center;
    color:#fff; font-family:var(--num); font-weight:700; font-size:26px; padding-top:12px; }
  .barcol .cap{ margin-top:12px; font-size:14px; color:var(--muted); text-align:center; }
  .barcol.old .bar{ background:#3A4470; }
  .barcol.new .bar{ background:linear-gradient(180deg,var(--gold),#e0a022); color:#151D3E; }

  /* roadmap steps */
  .steps{ display:flex; align-items:center; gap:16px; margin-top:auto; }
  .step{ flex:1; background:var(--navy2); border:1px solid var(--line); border-radius:12px; padding:20px; }
  .step .tag2{ display:inline-block; font-size:12px; font-weight:700; padding:4px 10px; border-radius:12px; margin-bottom:10px; }
  .step.s1 .tag2{ background:rgba(91,140,255,.18); color:var(--blue); }
  .step.s2 .tag2{ background:rgba(167,139,250,.18); color:var(--purple); }
  .step h4{ font-size:18px; color:var(--text); font-weight:700; }
  .step p{ font-size:13.5px; color:var(--muted); margin-top:8px; line-height:1.55; }
  .stepArrow{ font-size:30px; color:var(--gold); }

  /* appendix table */
  .table{ width:100%; margin-top:16px; border-collapse:collapse; font-size:13.5px; }
  .table th,.table td{ text-align:left; padding:10px 12px; border-bottom:1px solid var(--line); color:var(--text); }
  .table th{ color:var(--muted); font-weight:700; font-size:12px; letter-spacing:0.5px; background:var(--navy3); }
  .table td .fmt{ color:var(--gold); font-family:var(--num); font-weight:700; }
  .table td .path{ color:var(--blue); font-family:var(--num); font-size:12.5px; }

  /* divider */
  .divider{ align-items:center; justify-content:center; text-align:center; }
  .divider .part{ font-family:var(--num); font-size:20px; font-weight:700; color:var(--gold); letter-spacing:3px; }
  .divider .dtitle{ font-size:46px; font-weight:700; color:var(--text); margin-top:14px; line-height:1.2; }
  .divider .dline{ width:80px; height:4px; background:var(--purple); border-radius:2px; margin:22px auto 0; }

  /* cover */
  .cover{ justify-content:center; }
  .cover .kicker{ font-size:14px; letter-spacing:4px; color:var(--purple); font-weight:700; }
  .cover .logo{ font-family:var(--num); font-size:96px; font-weight:700; color:var(--text); letter-spacing:3px; line-height:1; margin-top:12px; }
  .cover .csub{ font-size:19px; color:var(--muted); margin-top:14px; }
  .cover .mean{ font-size:14px; color:var(--dim); margin-top:6px; }
  .cover .team{ display:flex; gap:22px; margin-top:28px; flex-wrap:wrap; }
  .cover .member{ font-size:14px; color:var(--text); }
  .cover .member b{ color:var(--gold); font-weight:700; }
  .cover .member span{ color:var(--muted); display:block; font-size:12.5px; margin-top:2px; }

  /* ending */
  .ending{ align-items:center; justify-content:center; text-align:center; }
  .ending .qa{ font-family:var(--num); font-size:88px; font-weight:700; color:var(--text); letter-spacing:6px; }
  .ending .contact{ margin-top:20px; font-size:15px; color:var(--muted); line-height:1.8; }
  .ending .contact .path{ color:var(--blue); font-family:var(--num); }

  /* mascot */
  .mascot{ position:absolute; right:26px; bottom:24px; display:flex; align-items:flex-end; gap:10px; z-index:4; max-width:60%; }
  .bubble{ background:var(--cream); border:2px solid var(--ink); border-radius:16px 16px 4px 16px; padding:9px 14px;
    font-size:13.5px; font-weight:700; color:#1a2340; line-height:1.4; box-shadow:2px 3px 0 rgba(0,0,0,.25); }
  .dog{ width:56px; height:56px; flex:0 0 auto; background:radial-gradient(circle at 50% 38%, #f7dd7e, #e9c34e);
    border:2.5px solid var(--ink); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; }
  .mascot.left{ left:40px; right:auto; }
  .divider .mascot,.cover .mascot,.ending .mascot{ position:absolute; }

  /* nav hint */
  .hint{ position:fixed; top:10px; right:14px; color:#888; font-size:12px; z-index:20; font-family:var(--sans); }
  .hint kbd{ background:#222; color:#ddd; border-radius:4px; padding:1px 6px; font-size:11px; }
</style>
</head>
<body>
<div class="hint">← → / Space 이동 · <kbd>F</kbd> 전체화면</div>
<div id="app"><div class="stage" id="stage"></div></div>
<script>
/* ---------- helpers ---------- */
const el = (h)=>{ const d=document.createElement('div'); d.innerHTML=h.trim(); return d.firstChild; };
const bubble = (text, side)=> text ? `<div class="mascot ${side||''}"><div class="bubble">${text}</div><div class="dog">🐶</div></div>` : '';
const IMG = '이미지/';

/* ---------- slide definitions ---------- */
const slides = [];

/* 0. COVER */
slides.push({ bar:'UKKKK — 서울시 출산·양육 정책 대시보드', variant:'cover', body:`
  <div class="kicker">SEOUL · MATERNITY & CHILDCARE POLICY</div>
  <div class="logo">UKKKK</div>
  <div class="csub">서울시 출산·보육 정책 수요 분석 대시보드</div>
  <div class="mean">Unified Key-Knowledge Kit · U자 요람 안에서 K(Kid)가 자라나는 브랜드 스토리</div>
  <div class="team">
    <div class="member"><b>[팀원 1]</b><span>기획 · 데이터 파이프라인</span></div>
    <div class="member"><b>[팀원 2]</b><span>모델링 · 분류</span></div>
    <div class="member"><b>[팀원 3]</b><span>프론트엔드 · 대시보드</span></div>
    <div class="member"><b>[팀원 4]</b><span>리서치 · 발표</span></div>
  </div>
  ${bubble('안녕하세요! 오피스 길잡이 새싹이입니다 🌱')}
`});

/* dividers */
const divider = (part, title)=>({ bar:title, variant:'divider', body:`
  <div class="part">${part}</div>
  <div class="dtitle">${title}</div>
  <div class="dline"></div>
`});

/* PART 1 */
slides.push(divider('PART 1','비즈니스 분석 결과'));

slides.push({ bar:'1-1 · 비즈니스 문제 제기', body:`
  <div class="eyebrow"><span class="bar"></span>실무 공무원의 Pain Point</div>
  <div class="headline">매일 쏟아지는 시민의 목소리,<br>행정의 현실은?</div>
  <div class="sub">여성가족실 3년 차 김민우 주무관은 상상대로·국민신문고에서 쏟아지는 제안과 민원 속에서<br>어떤 게 우선순위인지, 어디서 정책 공백이 생기는지 수작업으로 찾느라 소중한 행정 시간을 소모합니다.</div>
  <div class="tags"><span class="tag p">우선순위 판단 지연</span><span class="tag b">담당 부서 매칭 수작업</span><span class="tag g">정책 공백 미포착</span></div>
  ${bubble('담당 부서는 어디고, 공백은 어떻게 찾죠? 😭')}
`});

slides.push({ bar:'1-2 · AS-IS ➔ TO-BE', body:`
  <div class="eyebrow"><span class="bar"></span>현황 진단 및 해결 방향</div>
  <div class="headline">파편화에서 실시간 융합으로</div>
  <div class="cols">
    <div class="col asis"><div class="lbl">AS-IS · 파편화</div><ul>
      <li>상상대로·국민신문고·몽땅정보통 단절</li>
      <li>수요와 공급 정책이 분리</li>
      <li>18개 부서로 흩어진 R&amp;R</li>
      <li>수작업 대조로 시간 소모</li>
    </ul></div>
    <div class="arrow">➜</div>
    <div class="col tobe"><div class="lbl">TO-BE · 실시간 융합</div><ul>
      <li>5원 데이터 통합 파이프라인</li>
      <li>AI·규칙 기반 부서 자동 라우팅</li>
      <li>정책 공백 1클릭 포착</li>
      <li>갭 진단 대시보드로 의사결정</li>
    </ul></div>
  </div>
  ${bubble('파편화된 채널을 묶어 한눈에 파악할게요! 💡')}
`});

slides.push({ bar:'1-3 · 선행연구 ① 보육 수요', body:`
  <div class="eyebrow"><span class="bar"></span>시민의 실질적 보육 수요</div>
  <div class="headline">시민이 요구하는 보육의 핵심은?</div>
  <div class="spacer"></div>
  <div class="bigrow"><div class="bignum">992</div><div class="bigunit">건 · 국민신문고 저출산 민원<br>CONCOR 네트워크 분석</div></div>
  <div class="tags"><span class="tag g">시간제 보육 예약</span><span class="tag b">소아 응급 의료</span><span class="tag p">맞벌이 돌봄 공백</span></div>
  <div class="source">출처 · 한국생활과학회지 35(1), 홍향희·이정화</div>
  ${bubble('축하금보다 지속 돌봄 인프라에 목말라 있어요 🔎', 'left')}
`});

slides.push({ bar:'1-4 · 선행연구 ② 출산 장벽', body:`
  <div class="eyebrow"><span class="bar"></span>결혼·출산의 현실적 장벽</div>
  <div class="headline">결혼과 출산을 가로막는 진짜 장벽</div>
  <div class="spacer"></div>
  <div class="bigrow"><div class="bignum">25,800</div><div class="bigunit">건 · 저출산 뉴스 댓글<br>빅데이터 텍스트 마이닝</div></div>
  <div class="tags"><span class="tag gold">주택·주거</span><span class="tag b">일자리</span><span class="tag p">비용</span></div>
  <div class="source">출처 · 디지털융복합연구 19(12), 이정기 · '결혼'·'출산'과 동시 출현 1순위 단어</div>
  ${bubble('주거비와 일·가정 양립의 공백이 입증됐어요 🔎', 'left')}
`});

/* PART 2 */
slides.push(divider('PART 2','데이터 & 모델링 설명'));

slides.push({ bar:'2-1 · 5원 Multi-API 파이프라인', body:`
  <div class="eyebrow"><span class="bar"></span>실시간 수집 구조</div>
  <div class="headline">5가지 데이터의 실시간 수집 구조</div>
  <div class="pipe">
    <div class="nodes">

/* ---------- render engine ---------- */
let cur = 0;
const stage = document.getElementById('stage');

function render(){
  const s = slides[cur];
  stage.innerHTML = '';
  const win = el(`
    <div class="win">
      <div class="titlebar">
        <div class="t"><span class="sprout">🌱</span> 새싹이 오피스 길잡이 &nbsp;—&nbsp; ${s.bar}</div>
        <div class="winbtns"><span>_</span><span>□</span><span>×</span></div>
      </div>
      <div class="content ${s.variant||''}">${s.body}</div>
    </div>`);
  stage.appendChild(win);
  const tb = el(`<div class="taskbar">
      <div class="start"><span class="sprout">🌱</span> 시작</div>
      <div class="pageno">UKKKK.exe</div>
      <div class="clock">${String(cur+1).padStart(2,'0')} / ${slides.length}</div>
    </div>`);
  stage.appendChild(tb);
}

function fit(){
  const pad = 0;
  const sx = window.innerWidth / 1280, sy = window.innerHeight / 720;
  const sc = Math.min(sx, sy);
  stage.style.transform = `scale(${sc})`;
}
function go(n){ cur = Math.max(0, Math.min(slides.length-1, n)); render(); }

window.addEventListener('keydown', (e)=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){ e.preventDefault(); go(cur+1); }
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){ e.preventDefault(); go(cur-1); }
  else if(e.key==='Home'){ go(0); } else if(e.key==='End'){ go(slides.length-1); }
  else if(e.key.toLowerCase()==='f'){ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
});
stage.addEventListener('click', ()=>go(cur+1));
window.addEventListener('resize', fit);
render(); fit();
</script>
