<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UKKKK — 서울시 출산·양육 정책 수요 분석 대시보드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  /* Win98 desktop */
  --desk:#008080;
  /* taskbar / window chrome */
  --chrome:#C0C0C0; --hi:#FFFFFF; --lo:#808080; --dk:#404040;
  /* LIGHT palette (inside window) */
  --bg:#F3F5FC; --bg2:#E8ECF8; --ink:#1B2340; --ink2:#3A4270;
  --purple:#7C5CE0; --blue:#3558D6; --amber:#C77D00; --green:#0FA968; --coral:#E8554E;
  /* mascot */
  --cream:#FCFBE6; --bubbleBorder:#5A3E1B;
  /* fonts */
  --sans:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;
  --num:'Calibri','Segoe UI',var(--sans);
}
html,body{height:100%;background:#000;font-family:var(--sans);overflow:hidden;}

/* ── layout ── */
#app{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
.stage{
  width:1280px;height:720px;flex:0 0 auto;
  background:var(--desk);position:relative;
  transform-origin:center center;
}
/* subtle grid dots on desktop */
.stage::before{
  content:"";position:absolute;inset:0;
  background-image:radial-gradient(rgba(255,255,255,.06) 1px,transparent 1px);
  background-size:24px 24px;pointer-events:none;z-index:0;
}

/* ── WIN98 TASKBAR ── */
.taskbar{
  position:absolute;left:0;right:0;bottom:0;height:32px;z-index:10;
  background:var(--chrome);
  border-top:2px solid var(--hi);
  display:flex;align-items:center;padding:0 4px;gap:4px;
}
.start-btn{
  display:flex;align-items:center;gap:4px;
  padding:2px 8px 2px 4px;font-size:12px;font-weight:700;color:#000;
  border-top:2px solid var(--hi);border-left:2px solid var(--hi);
  border-right:2px solid var(--dk);border-bottom:2px solid var(--dk);
  background:var(--chrome);cursor:pointer;
}
.start-btn img{width:18px;height:18px;image-rendering:pixelated;}
.tb-sep{width:1px;height:22px;border-left:1px solid var(--lo);border-right:1px solid var(--hi);margin:0 2px;}
.tb-item{
  font-size:11px;color:#000;padding:2px 10px;
  border-top:2px solid var(--hi);border-left:2px solid var(--hi);
  border-right:2px solid var(--dk);border-bottom:2px solid var(--dk);
  background:var(--chrome);min-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tb-clock{
  margin-left:auto;font-size:11px;font-family:var(--num);color:#000;
  padding:2px 8px;
  border-top:2px solid var(--lo);border-left:2px solid var(--lo);
  border-right:2px solid var(--hi);border-bottom:2px solid var(--hi);
}

/* ── WIN98 WINDOW ── */
.win{
  position:absolute;top:16px;left:24px;right:24px;bottom:48px;z-index:2;
  background:var(--chrome);
  border-top:2px solid var(--hi);border-left:2px solid var(--hi);
  border-right:2px solid var(--dk);border-bottom:2px solid var(--dk);
  display:flex;flex-direction:column;
  box-shadow:2px 2px 0 #000;
}
/* title bar — blue gradient */
.titlebar{
  height:26px;flex:0 0 auto;
  background:linear-gradient(90deg,#000080,#1084d0);
  color:#fff;display:flex;align-items:center;padding:0 3px 0 4px;gap:4px;
}
.titlebar .ico{width:16px;height:16px;image-rendering:pixelated;}
.titlebar .t{flex:1;font-size:12px;font-weight:700;letter-spacing:.3px;padding-left:2px;white-space:nowrap;overflow:hidden;}
.winbtns{display:flex;gap:2px;}
.winbtns span{
  width:16px;height:14px;font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  background:var(--chrome);color:#000;
  border-top:1px solid var(--hi);border-left:1px solid var(--hi);
  border-right:1px solid var(--dk);border-bottom:1px solid var(--dk);
}
/* menu bar */
.menubar{
  height:20px;background:var(--chrome);display:flex;align-items:center;padding:0 6px;gap:12px;
  font-size:11px;color:#000;border-bottom:1px solid var(--lo);
}
.menubar span{cursor:default;}
.menubar span u{text-decoration:underline;}

/* ── CONTENT AREA (LIGHT palette) ── */
.content{
  flex:1;margin:3px;overflow:hidden;position:relative;
  background:var(--bg);
  border-top:2px solid var(--lo);border-left:2px solid var(--lo);
  border-right:2px solid var(--hi);border-bottom:2px solid var(--hi);
  display:flex;flex-direction:column;padding:28px 36px;
}

/* ── TYPOGRAPHY ── */
.eyebrow{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--purple);letter-spacing:1px;text-transform:uppercase;}
.eyebrow .bar{width:20px;height:3px;border-radius:1px;background:var(--purple);}
.headline{font-size:28px;font-weight:700;color:var(--ink);margin-top:10px;line-height:1.3;}
.sub{font-size:14px;color:var(--ink2);margin-top:6px;line-height:1.6;}
.spacer{flex:1 1 auto;}

/* big number */
.bigrow{display:flex;align-items:baseline;gap:14px;margin-top:16px;}
.bignum{font-family:var(--num);font-size:96px;font-weight:700;color:var(--purple);line-height:.9;letter-spacing:-2px;}
.bigunit{font-size:14px;color:var(--ink2);line-height:1.5;}
.source{font-size:12px;color:var(--ink2);opacity:.6;margin-top:10px;}

/* tags */
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
.tag{font-size:13px;padding:6px 14px;border-radius:4px;font-weight:600;border:1.5px solid;}
.tag.g{color:var(--green);background:rgba(15,169,104,.08);border-color:rgba(15,169,104,.35);}
.tag.b{color:var(--blue);background:rgba(53,88,214,.08);border-color:rgba(53,88,214,.35);}
.tag.p{color:var(--purple);background:rgba(124,92,224,.08);border-color:rgba(124,92,224,.35);}
.tag.a{color:var(--amber);background:rgba(199,125,0,.08);border-color:rgba(199,125,0,.35);}

/* cards */
.cards{display:grid;gap:12px;margin-top:auto;}
.cards.c2{grid-template-columns:1fr 1fr;}
.cards.c4{grid-template-columns:1fr 1fr;}
.card{
  background:#fff;border:1px solid #D8DDF0;border-radius:6px;padding:16px 18px;
  box-shadow:0 1px 3px rgba(27,35,64,.06);
}
.card h4{font-size:15px;color:var(--ink);font-weight:700;display:flex;align-items:center;gap:6px;}
.card p{font-size:13px;color:var(--ink2);margin-top:6px;line-height:1.55;}
.card .num{font-family:var(--num);color:var(--purple);font-weight:700;}

/* as-is / to-be */
.cols{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:stretch;margin-top:auto;}
.col{background:#fff;border:1px solid #D8DDF0;border-radius:6px;padding:16px 18px;box-shadow:0 1px 3px rgba(27,35,64,.06);}
.col.asis{border-left:3px solid var(--coral);}
.col.tobe{border-left:3px solid var(--green);}
.col .lbl{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--ink2);}
.col.tobe .lbl{color:var(--green);}
.col.asis .lbl{color:var(--coral);}
.col ul{margin-top:8px;list-style:none;display:flex;flex-direction:column;gap:6px;}
.col li{font-size:13px;color:var(--ink);line-height:1.45;padding-left:14px;position:relative;}
.col li::before{content:"—";position:absolute;left:0;color:var(--lo);}
.arrow{display:flex;align-items:center;font-size:28px;color:var(--purple);font-weight:700;}

/* pipeline */
.pipe{display:flex;align-items:center;gap:14px;margin-top:auto;}
.nodes{display:flex;flex-direction:column;gap:7px;flex:0 0 auto;}
.node{background:#fff;border:1px solid #D8DDF0;border-radius:4px;padding:8px 14px;font-size:13px;color:var(--ink);
  display:flex;align-items:center;justify-content:space-between;gap:14px;min-width:280px;box-shadow:0 1px 3px rgba(27,35,64,.06);}
.node .n{font-family:var(--num);font-weight:700;color:var(--purple);font-size:14px;}
.funnel{font-size:28px;color:var(--purple);}
.hub{background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;border-radius:8px;padding:20px;
  font-weight:700;font-size:16px;text-align:center;line-height:1.4;box-shadow:0 4px 16px rgba(53,88,214,.25);}

/* formula */
.formula{background:#fff;border:1px solid #D8DDF0;border-radius:8px;padding:22px;margin-top:auto;
  text-align:center;font-family:var(--num);font-size:20px;color:var(--ink);line-height:1.6;box-shadow:0 1px 3px rgba(27,35,64,.06);}
.formula .k{color:var(--blue);font-weight:700;}
.formula .w{color:var(--purple);font-weight:700;}
.chips{display:flex;gap:10px;margin-top:12px;}
.chip{flex:1;background:var(--bg2);border:1px solid #D8DDF0;border-radius:6px;padding:10px 12px;font-size:12px;color:var(--ink2);}
.chip b{color:var(--purple);font-family:var(--num);}

/* screenshot polaroid */
.shotwrap{flex:1 1 auto;display:flex;align-items:center;justify-content:center;margin-top:8px;min-height:0;}
.polaroid{background:#fff;padding:8px 8px 32px;border-radius:2px;box-shadow:0 8px 24px rgba(0,0,0,.15);
  transform:rotate(-1deg);max-height:100%;position:relative;}
.polaroid img{display:block;max-height:310px;max-width:620px;width:auto;border:1px solid #e0e0e0;}
.polaroid .cap{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:12px;color:#888;}

/* tree */
.tree{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;margin-top:auto;}
.leaf{background:#fff;border:1px solid #D8DDF0;border-left:3px solid var(--purple);border-radius:4px;
  padding:8px 12px;font-size:12.5px;color:var(--ink);display:flex;align-items:center;gap:8px;box-shadow:0 1px 3px rgba(27,35,64,.06);}
.leaf .idx{font-family:var(--num);font-weight:700;color:var(--purple);font-size:13px;min-width:16px;}

/* bars */
.bars{display:flex;gap:28px;align-items:flex-end;margin-top:auto;height:260px;padding:0 16px;}
.barcol{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex:1;height:100%;}
.barcol .bar{width:110px;border-radius:6px 6px 0 0;display:flex;align-items:flex-start;justify-content:center;
  font-family:var(--num);font-weight:700;font-size:24px;padding-top:10px;}
.barcol .cap{margin-top:10px;font-size:13px;color:var(--ink2);text-align:center;}
.barcol.old .bar{background:#D8DDF0;color:var(--ink2);}
.barcol.new .bar{background:linear-gradient(180deg,var(--purple),var(--blue));color:#fff;}

/* steps */
.steps{display:flex;align-items:center;gap:12px;margin-top:auto;}
.step{flex:1;background:#fff;border:1px solid #D8DDF0;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(27,35,64,.06);}
.step .tag2{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;margin-bottom:8px;}
.step.s1 .tag2{background:rgba(53,88,214,.1);color:var(--blue);}
.step.s2 .tag2{background:rgba(124,92,224,.1);color:var(--purple);}
.step h4{font-size:16px;color:var(--ink);font-weight:700;}
.step p{font-size:12.5px;color:var(--ink2);margin-top:6px;line-height:1.5;}
.stepArrow{font-size:24px;color:var(--purple);font-weight:700;}

/* table */
.atable{width:100%;margin-top:14px;border-collapse:collapse;font-size:12.5px;}
.atable th,.atable td{text-align:left;padding:8px 10px;border-bottom:1px solid #D8DDF0;color:var(--ink);}
.atable th{color:var(--ink2);font-weight:700;font-size:11px;letter-spacing:.5px;background:var(--bg2);}
.atable td .fmt{color:var(--purple);font-family:var(--num);font-weight:700;}
.atable td .path{color:var(--blue);font-family:var(--num);font-size:11.5px;}

/* ── DIVIDER ── */
.divider{align-items:center;justify-content:center;text-align:center;}
.divider .part{font-family:var(--num);font-size:18px;font-weight:700;color:var(--purple);letter-spacing:3px;}
.divider .dtitle{font-size:40px;font-weight:700;color:var(--ink);margin-top:12px;line-height:1.2;}
.divider .dline{width:60px;height:3px;background:var(--purple);border-radius:2px;margin:18px auto 0;}

/* ── COVER ── */
.cover{justify-content:center;align-items:center;text-align:center;}
.cover .kicker{font-size:12px;letter-spacing:4px;color:var(--purple);font-weight:700;}
.cover .logo{font-family:var(--num);font-size:80px;font-weight:700;color:var(--ink);letter-spacing:4px;line-height:1;margin-top:10px;}
.cover .csub{font-size:17px;color:var(--ink2);margin-top:10px;}
.cover .mean{font-size:12px;color:var(--ink2);margin-top:4px;opacity:.6;}
.cover .team{display:flex;gap:18px;margin-top:24px;justify-content:center;flex-wrap:wrap;}
.cover .member{font-size:13px;color:var(--ink);text-align:center;}
.cover .member b{color:var(--purple);font-weight:700;}
.cover .member span{color:var(--ink2);display:block;font-size:11.5px;margin-top:2px;}
/* click button */
.click98{
  margin-top:28px;display:inline-flex;align-items:center;gap:6px;
  padding:6px 20px;font-size:13px;font-weight:700;color:#000;
  background:var(--chrome);
  border-top:2px solid var(--hi);border-left:2px solid var(--hi);
  border-right:2px solid var(--dk);border-bottom:2px solid var(--dk);
  cursor:pointer;position:relative;
}
.click98 .cursor98{position:absolute;right:-28px;bottom:-8px;width:24px;pointer-events:none;image-rendering:pixelated;}

/* ── ENDING ── */
.ending{align-items:center;justify-content:center;text-align:center;}
.ending .qa{font-family:var(--num);font-size:72px;font-weight:700;color:var(--ink);letter-spacing:6px;}
.ending .contact{margin-top:16px;font-size:14px;color:var(--ink2);line-height:1.8;}
.ending .contact .path{color:var(--blue);font-family:var(--num);}

/* ══════════════════════════════════════════
   MASCOT + SPEECH BUBBLE (CSS-only tail!)
   ══════════════════════════════════════════ */
.mascot{
  position:absolute;right:20px;bottom:16px;
  display:flex;align-items:flex-end;gap:0;z-index:6;max-width:55%;
}
.mascot.left{left:24px;right:auto;flex-direction:row-reverse;}
.mascot .dogimg{width:60px;height:60px;flex:0 0 auto;object-fit:contain;filter:drop-shadow(1px 2px 0 rgba(0,0,0,.2));}

/* speech bubble with tail */
.bubble{
  position:relative;
  background:var(--cream);
  border:2.5px solid var(--bubbleBorder);
  border-radius:14px;
  padding:10px 14px;
  font-size:13px;font-weight:600;color:#1a2340;line-height:1.45;
  box-shadow:2px 3px 0 rgba(0,0,0,.18);
  margin-bottom:14px;
}
/* tail pointing right (toward dog on right) */
.bubble::after{
  content:"";position:absolute;bottom:8px;right:-12px;
  width:0;height:0;
  border-top:8px solid transparent;
  border-bottom:8px solid transparent;
  border-left:12px solid var(--cream);
  filter:drop-shadow(2px 1px 0 rgba(0,0,0,.12));
}
.bubble::before{
  content:"";position:absolute;bottom:6px;right:-16px;
  width:0;height:0;
  border-top:10px solid transparent;
  border-bottom:10px solid transparent;
  border-left:15px solid var(--bubbleBorder);
}
/* tail pointing left (dog on left) */
.mascot.left .bubble::after{
  right:auto;left:-12px;
  border-left:none;
  border-right:12px solid var(--cream);
}
.mascot.left .bubble::before{
  right:auto;left:-16px;
  border-left:none;
  border-right:15px solid var(--bubbleBorder);
}

/* nav hint */
.hint{position:fixed;top:8px;right:12px;color:#666;font-size:11px;z-index:20;font-family:var(--sans);background:rgba(255,255,255,.85);padding:3px 8px;border-radius:4px;}
.hint kbd{background:#e0e0e0;color:#333;border-radius:3px;padding:1px 5px;font-size:10px;}

/* transitions */
.content{animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>
<div class="hint"><kbd>←</kbd> <kbd>→</kbd> / <kbd>Space</kbd> 이동 · <kbd>F</kbd> 전체화면</div>
<div id="app"><div class="stage" id="stage"></div></div>
<script>
const el=h=>{const d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;};
const IMG='이미지/';

/* mascot helper — uses actual saessak.png + CSS bubble with tail */
const mascot=(text,side)=>{
  if(!text) return '';
  const cls=side==='left'?'mascot left':'mascot';
  return `<div class="${cls}">
    <div class="bubble">${text}</div>
    <img class="dogimg" src="${IMG}saessak.png" alt="새싹이">
  </div>`;
};

/* ═══════ SLIDES ═══════ */
const slides=[];

/* 0 COVER */
slides.push({bar:'UKKKK — 서울시 출산·양육 정책 대시보드',variant:'cover',body:`
  <div class="kicker">SEOUL MATERNITY & CHILDCARE POLICY</div>
  <div class="logo">UKKKK</div>
  <div class="csub">서울시 출산·보육 정책 수요 분석 대시보드</div>
  <div class="mean">Unified Key-Knowledge Kit · U자 요람 안에서 K(Kid)가 자라나는 브랜드 스토리</div>
  <div class="team">
    <div class="member"><b>[팀원 1]</b><span>기획 · 데이터 파이프라인</span></div>
    <div class="member"><b>[팀원 2]</b><span>모델링 · 분류</span></div>
    <div class="member"><b>[팀원 3]</b><span>프론트엔드 · 대시보드</span></div>
    <div class="member"><b>[팀원 4]</b><span>리서치 · 발표</span></div>
  </div>
  <div class="click98">▶ 클릭하여 발표 시작<img class="cursor98" src="${IMG}cursor98_click.png" alt=""></div>
  ${mascot('안녕하세요! 오피스 길잡이 새싹이입니다')}
`});

/* divider helper */
const divider=(part,title)=>({bar:title,variant:'divider',body:`
  <div class="part">${part}</div>
  <div class="dtitle">${title}</div>
  <div class="dline"></div>
`});

/* ─── PART 1 ─── */
slides.push(divider('PART 1','비즈니스 분석 결과'));

/* 1-1 */
slides.push({bar:'1-1 · 비즈니스 문제 제기',body:`
  <div class="eyebrow"><span class="bar"></span>실무 공무원의 Pain Point</div>
  <div class="headline">매일 쏟아지는 시민의 목소리,<br>행정의 현실은?</div>
  <div class="sub">여성가족실 3년 차 김민우 주무관은 상상대로·국민신문고에서 쏟아지는 제안과 민원 속에서<br>어떤 게 우선순위인지, 어디서 정책 공백이 생기는지 수작업으로 찾느라 소중한 행정 시간을 소모합니다.</div>
  <div class="spacer"></div>
  <div class="tags"><span class="tag p">우선순위 판단 지연</span><span class="tag b">담당 부서 매칭 수작업</span><span class="tag g">정책 공백 미포착</span></div>
  ${mascot('담당 부서는 어디고, 공백은 어떻게 찾죠?')}
`});

/* 1-2 */
slides.push({bar:'1-2 · AS-IS → TO-BE',body:`
  <div class="eyebrow"><span class="bar"></span>현황 진단 및 해결 방향</div>
  <div class="headline">파편화에서 실시간 융합으로</div>
  <div class="cols">
    <div class="col asis"><div class="lbl">AS-IS · 파편화</div><ul>
      <li>상상대로·국민신문고·몽땅정보통 단절</li>
      <li>수요와 공급 정책이 분리</li>
      <li>18개 부서로 흩어진 R&R</li>
      <li>수작업 대조로 시간 소모</li>
    </ul></div>
    <div class="arrow">→</div>
    <div class="col tobe"><div class="lbl">TO-BE · 실시간 융합</div><ul>
      <li>5원 데이터 통합 파이프라인</li>

/* ═══════ RENDER ENGINE ═══════ */
let cur=0;
const stage=document.getElementById('stage');

function render(){
  const s=slides[cur];
  stage.innerHTML='';
  /* window */
  const win=el(`
    <div class="win">
      <div class="titlebar">
        <img class="ico" src="${IMG}saessak.png" alt="">
        <div class="t">새싹이 오피스 길잡이 — ${s.bar}</div>
        <div class="winbtns"><span>_</span><span>&#9633;</span><span>&times;</span></div>
      </div>
      <div class="menubar"><span><u>F</u>ile</span><span><u>E</u>dit</span><span><u>V</u>iew</span><span><u>H</u>elp</span></div>
      <div class="content ${s.variant||''}">${s.body}</div>
    </div>`);
  stage.appendChild(win);
  /* taskbar */
  const tb=el(`<div class="taskbar">
    <div class="start-btn"><img src="${IMG}saessak.png" alt=""> 시작</div>
    <div class="tb-sep"></div>
    <div class="tb-item">새싹이 오피스 길잡이 — ${s.bar}</div>
    <div class="tb-clock">${String(cur+1).padStart(2,'0')} / ${slides.length}</div>
  </div>`);
  stage.appendChild(tb);
}

function fit(){
  const sx=window.innerWidth/1280,sy=window.innerHeight/720;
  stage.style.transform=`scale(${Math.min(sx,sy)})`;
}

function go(n){cur=Math.max(0,Math.min(slides.length-1,n));render();}

window.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();go(cur+1);}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();go(cur-1);}
  else if(e.key==='Home'){go(0);}else if(e.key==='End'){go(slides.length-1);}
  else if(e.key.toLowerCase()==='f'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
});
stage.addEventListener('click',()=>go(cur+1));
window.addEventListener('resize',fit);
render();fit();
</script>
</body>
</html>
